<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastoral Tales 地图编辑器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='editor.css') }}">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <h1>🌾 Pastoral Tales 地图编辑器</h1>
            <div class="header-info">
                <span id="status">就绪</span>
                <span id="cursor-pos">坐标: (—, —)</span>
                <span id="selected-tile-label">当前瓦片: —</span>
            </div>
        </header>

        <div class="main-layout">
            <!-- Left Panel: Palette + Tools -->
            <aside class="left-panel">
                <!-- Tile Palette -->
                <section class="panel-section">
                    <h2>瓦片调色板</h2>
                    <div id="tile-palette" class="tile-palette"></div>
                </section>

                <!-- Tools -->
                <section class="panel-section">
                    <h2>工具</h2>
                    <div class="tool-buttons">
                        <button class="tool-btn active" data-tool="brush" title="画笔 (B)">
                            🖌️ 画笔
                        </button>
                        <button class="tool-btn" data-tool="eraser" title="橡皮擦 (E)">
                            🧹 橡皮擦
                        </button>
                        <button class="tool-btn" data-tool="fill" title="填充 (F)">
                            🪣 填充
                        </button>
                        <button class="tool-btn" data-tool="eyedropper" title="取色器 (I)">
                            💉 取色器
                        </button>
                    </div>
                </section>

                <!-- Actions -->
                <section class="panel-section">
                    <h2>操作</h2>
                    <div class="action-buttons">
                        <button id="btn-new">📄 新建</button>
                        <button id="btn-save">💾 保存</button>
                        <button id="btn-load">📂 加载</button>
                        <button id="btn-export">📋 导出代码</button>
                        <button id="btn-preview">👁️ 预览</button>
                    </div>
                </section>

                <!-- Map Info -->
                <section class="panel-section">
                    <h2>地图信息</h2>
                    <div class="map-info">
                        <div>尺寸: <strong id="map-size">30 × 20</strong></div>
                        <div>瓦片大小: <strong>16×16 px</strong></div>
                    </div>
                </section>
            </aside>

            <!-- Right: Canvas Area -->
            <main class="canvas-area">
                <div class="canvas-wrapper" id="canvas-wrapper">
                    <canvas id="map-canvas"></canvas>
                    <div id="tooltip" class="tooltip" style="display:none;"></div>
                </div>
                <!-- Canvas Controls -->
                <div class="canvas-controls">
                    <label>
                        <input type="checkbox" id="toggle-grid" checked>
                        显示网格
                    </label>
                    <label>
                        缩放:
                        <input type="range" id="zoom-slider" min="1" max="4" step="0.5" value="2">
                        <span id="zoom-label">2×</span>
                    </label>
                </div>
            </main>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>地图预览</h2>
                <button id="preview-close">✕</button>
            </div>
            <canvas id="preview-canvas"></canvas>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" class="modal" style="display:none;">
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <h2>导出的 GDScript 代码</h2>
                <button id="export-close">✕</button>
            </div>
            <textarea id="export-code" readonly></textarea>
            <button id="export-copy" class="btn-primary">📋 复制代码</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='editor.js') }}"></script>
</body>
</html>
